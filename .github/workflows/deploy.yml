name: Deploy 1.0

on:
  push:
    branches:
      - dev # Ветвь, с которой будет происходить деплой

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: "20" # Укажите версию Node.js, если используется

      - name: Install dependencies
        run: npm install # Используйте команду, соответствующую вашему проекту

      - name: Build the project
        run: npm run dev # Используйте команду, соответствующую вашему проекту

      - name: Deploy 1.0
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build # Директория, которая будет опубликована (замените на свою)
